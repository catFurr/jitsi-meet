# Custom Jicofo Configuration for Sonacove
# This file contains only the customizations and overrides for the default jicofo configuration
# It is included by the default jicofo.conf via: include "custom-jicofo.conf"

jicofo {
  bridge {
    brewery-jid = "JvbBrewery@internal.auth.meet.sonacove.com"
  }

  authentication: {
    enabled = true
    type = "JWT"
    login-url = "meet.sonacove.com"
  }

  codec {
    video {}
    audio {}
    rtp-extensions {
      video-layers-allocation {
        enabled = false
      }
    }
  }

  conference {
    max-ssrcs-per-user = "20"
    max-ssrc-groups-per-user = "20"

    enable-auto-owner = false
  }

  octo {
    enabled = false
    sctp-datachannels = true
  }

  sctp {
    enabled = true
  }

  xmpp {
    client {
      enabled = true
      hostname = "prosody"
      port = "5222"
      domain = "auth.meet.sonacove.com"
      xmpp-domain = "meet.sonacove.com"
      username = "focus"
      password = "{{ .Env.JICOFO_AUTH_PASSWORD }}"
      conference-muc-jid = "conference.meet.sonacove.com"
      client-proxy = "focus.meet.sonacove.com"
      disable-certificate-verification = true
    }

    trusted-domains = [ "recorder.meet.sonacove.com" ]
  }

  health {
    enabled = true
    interval = 120 seconds
    timeout = 30 seconds
    max-check-duration = 30 seconds
    room-name-prefix = "__jicofo-health-check"
  }

  metrics {
    update-interval = 90 seconds
  }

  rest {
    enabled = true
    port = 8888
    host = "0.0.0.0"

    prometheus {
      enabled = true
    }
    conference-request {
      enabled = false
    }
    move-endpoints {
      enabled = false
    }
    debug {
      enabled = false
    }
    pin {
      enabled = false
    }
  }
}
