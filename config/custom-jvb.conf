# Custom JVB Configuration for Sonacove
# This file contains only the customizations and overrides for the default JVB configuration
# It is included by the default jvb.conf via: include "custom-jvb.conf"

videobridge {
    cc {
        use-vla-target-bitrate = false
        trust-bwe = true
    }

    ice {
        udp {
            port = 10000
        }
        advertise-private-candidates = true
    }

    apis {
        xmpp-client {
            configs {
                shard0 {
                    HOSTNAME = "meet.sonacove.com"
                    PORT = "5222"
                    DOMAIN = "auth.meet.sonacove.com"
                    USERNAME = "jvb"
                    PASSWORD = "{{ .Env.JVB_AUTH_PASSWORD }}"
                    MUC_JIDS = "JvbBrewery@internal.auth.meet.sonacove.com"
                    MUC_NICKNAME = "6bf5c8de-aa37-46cf-a9b4-0a49654f3be5"
                    DISABLE_CERTIFICATE_VERIFICATION = true
                }
            }
        }
        rest {
            enabled = false
        }
    }

    rest {
        enabled = true
        shutdown {
            enabled = false
        }
    }

    sctp {
      enabled = true
      use-usrsctp = false
    }

    stats {
        enabled = true
        transport = "muc"
    }

    websockets {
        domain = "localhost:8443"
        server-id = "{{ .Env.JVB_WS_SERVER_ID_FALLBACK }}"
        enabled = false
        tls = true
        keep-alive-timeout = 30 seconds
        # domain = "meet.sonacove.com:443"
        # server-id = "jvb-sonacove"
    }

    http-servers {
        private {
          host = 0.0.0.0
          send-server-version = false
        }
        public {
            host = 0.0.0.0
            port = 9090
            send-server-version = false
        }
    }

    health {
        require-valid-address = false
    }
}

ice4j {
    harvest {
        mapping {
            stun {
                enabled = false
                addresses = [ "meet-jit-si-turnrelay.jitsi.net:443" ]
            }
            static-mappings = []
        }
        # Disable AWS harvester as per your existing config
        use-component-socket = true
    }
}
