# Custom JVB Configuration for Sonacove
# This file contains only the customizations and overrides for the default JVB configuration
# It is included by the default jvb.conf via: include "custom-jvb.conf"

videobridge {
    cc {
        use-vla-target-bitrate = false
        trust-bwe = true
    }

    ice {
        udp {
            port = 10000
        }
        advertise-private-candidates = false
    }

    apis {
        xmpp-client {
            configs {
                shard0 {
                    HOSTNAME = "meet.sonacove.com"
                    PORT = "5222"
                    DOMAIN = "auth.meet.sonacove.com"
                    USERNAME = "jvb"
                    # PASSWORD = "{{ Set By Default File }}"
                    MUC_JIDS = "JvbBrewery@internal.auth.meet.sonacove.com"
                    # MUC_NICKNAME = "{{ Set By Default File }}"
                    DISABLE_CERTIFICATE_VERIFICATION = true
                }
            }
        }
        rest {
            enabled = false
        }
    }

    rest {
        enabled = true
        shutdown {
            enabled = false
        }
    }

    sctp {
      enabled = true
      use-usrsctp = false
    }

    stats {
        enabled = true
        transport = "muc"
    }

    websockets {
        # server-id = "Set By Default File"
        # domain = "Set By Default File"
        enabled = false
        tls = true
        keep-alive-timeout = 30 seconds
    }

    http-servers {
        private {
          host = 0.0.0.0
          send-server-version = false
        }
        public {
            host = 0.0.0.0
            port = 9090
            send-server-version = false
        }
    }

    health {
        require-valid-address = false
    }

    # Set By Default File
    # relay {
    #     enabled
    #     region
    #     relay-id
    # }

    load-management {
        reducer-enabled = true
    }
}

ice4j {
    harvest {
        mapping {
            stun {
                enabled = true
                addresses = [ "meet-jit-si-turnrelay.jitsi.net:443" ]
            }
            static-mappings = []
        }
        # Disable AWS harvester as per your existing config
        use-component-socket = true
    }
}
